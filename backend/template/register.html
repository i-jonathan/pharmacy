{{define "register.html"}}
<!doctype html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} | Primocrest Pharmacy</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <style>
        html {
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
    {{template "nav.html" .}}
    
    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-md">
            <h2 class="text-2xl font-semibold text-center mb-6">
                Create an account
            </h2>
            <form id="register-form" action="/user/register" method="POST" class="space-y-5">
                {{ .CSRFField }}

                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        class="mt-1 w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                    />
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="mt-1 w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                    />
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Confirm Password
                    </label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm_password"
                        required
                        class="mt-1 w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2"
                    />
                    <p id="password-match-message" class="text-sm mt-1"></p>
                </div>

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full bg-primary text-white py-2 px-4 rounded-lg hover:bg-emerald-700 transition"
                >
                    Sign Up
                </button>
            </form>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/static/js/theme.js"></script>
    <script>
        const form = document.getElementById("register-form");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirm-password");
        const message = document.getElementById("password-match-message");

        function checkPasswordMatch() {
            if (!confirmPassword.value) {
                confirmPassword.classList.remove("border-green-500", "border-red-500");
                message.textContent = "";
                return;
            }

            if (password.value === confirmPassword.value) {
                confirmPassword.classList.remove("border-red-500");
                confirmPassword.classList.add("border-green-500");
                message.textContent = "Passwords match!";
                message.className = "text-sm mt-1 text-green-600 dark:text-green-400";
            } else {
                confirmPassword.classList.remove("border-green-500");
                confirmPassword.classList.add("border-red-500");
                message.textContent = "Passwords do not match.";
                message.className = "text-sm mt-1 text-red-600 dark:text-red-400";
            }
        }

        confirmPassword.addEventListener("input", checkPasswordMatch);
        password.addEventListener("input", checkPasswordMatch);

        form.addEventListener("submit", function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                message.textContent = "Passwords must match to continue.";
                message.className = "text-sm mt-1 text-red-600 dark:text-red-400";
            }
        });
    </script>
</body>
</html>
{{end}}
