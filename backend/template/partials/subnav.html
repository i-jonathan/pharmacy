{{/* Sub navigation based on active page - Hidden on mobile since it's in hamburger menu */}}
{{if eq .ActivePage "inventory"}}
<nav class="hidden md:block bg-gray-50 dark:bg-gray-800 border-t border-b border-gray-200 dark:border-gray-700 px-4 md:px-6 py-3">
    <div class="flex flex-col md:flex-row md:space-x-6 space-y-2 md:space-y-0">
        <a href="/inventory/items" class="{{if eq .SubActivePage "item-list"}}text-primary font-semibold border-b-2 border-primary pb-1{{else}}text-gray-600 dark:text-gray-300 hover:text-primary{{end}}">Item List</a>
        <a href="/inventory/receive-items" class="{{if eq .SubActivePage "receive-items"}}text-primary font-semibold border-b-2 border-primary pb-1{{else}}text-gray-600 dark:text-gray-300 hover:text-primary{{end}}">Receive Items</a>
        <a href="/inventory/report/stock" class="text-gray-600 dark:text-gray-300 hover:text-primary">Export Stock</a>
    </div>
</nav>
{{else if eq .ActivePage "sales"}}
<nav class="hidden md:block bg-gray-50 dark:bg-gray-800 border-t border-b border-gray-200 dark:border-gray-700 px-4 md:px-6 py-3">
    <div class="flex flex-col md:flex-row md:space-x-6 space-y-2 md:space-y-0">
        <a href="/sales/receipt" class="{{if eq .SubActivePage "new-sale"}}text-primary font-semibold border-b-2 border-primary pb-1{{else}}text-gray-600 dark:text-gray-300 hover:text-primary{{end}}">New Sale</a>
        <a href="/sales/history" class="{{if eq .SubActivePage "sales-history"}}text-primary font-semibold border-b-2 border-primary pb-1{{else}}text-gray-600 dark:text-gray-300 hover:text-primary{{end}}">Sales History</a>
        <a href="/sales/held" class="{{if eq .SubActivePage "held-receipts"}}text-primary font-semibold border-b-2 border-primary pb-1{{else}}text-gray-600 dark:text-gray-300 hover:text-primary{{end}}">Held Sales</a>
    </div>
</nav>
{{else if eq .ActivePage "stock-taking"}}
<nav class="hidden md:block bg-gray-50 dark:bg-gray-800 border-t border-b border-gray-200 dark:border-gray-700 px-4 md:px-6 py-3">
    <div class="flex flex-col md:flex-row md:space-x-6 space-y-2 md:space-y-0">
        <a href="/stock-taking/" class="{{if eq .SubActivePage "dashboard"}}text-primary font-semibold border-b-2 border-primary pb-1{{else}}text-gray-600 dark:text-gray-300 hover:text-primary{{end}}">Dashboard</a>
    </div>
</nav>
{{end}}
