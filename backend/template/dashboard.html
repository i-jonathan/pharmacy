{{define "dashboard.html"}}
<!doctype html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} | Primocrest Pharmacy</title>
    <link href="/static/css/tailwind.css" rel="stylesheet" />
    <style>
        html {
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
    {{template "nav.html" .}}
    {{template "subnav.html" .}}

    <!-- Main Content -->
    <main class="flex-1">
        <!-- New UI Banner -->
        <div class="max-w-7xl mx-auto px-4 md:px-6 pt-4">
            <a href="/app/dashboard?ui=v2" class="block bg-indigo-50 dark:bg-indigo-950 border border-indigo-200 dark:border-indigo-800 rounded-lg px-4 py-3 text-sm text-indigo-700 dark:text-indigo-300 hover:bg-indigo-100 dark:hover:bg-indigo-900 transition-colors text-center">
                Try the new dashboard UI &#8594;
            </a>
        </div>
        <div id="app"></div>
    </main>

    <!-- Scripts -->
    <script src="/static/js/chart.js"></script>
    <script src="/static/js/theme.js"></script>
    <script type="module" src="{{ ViteAsset "src/main.js" }}"></script>
</body>
</html>
{{end}}
